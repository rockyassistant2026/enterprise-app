<svg width="300" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="personGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9945ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e3a8a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Body -->
  <circle cx="150" cy="120" r="45" fill="#f97316"/>
  <!-- Torso -->
  <rect x="100" y="170" width="100" height="120" fill="#06b6d4" rx="10"/>
  <!-- Arms -->
  <rect x="30" y="180" width="70" height="25" fill="#f97316" rx="12"/>
  <rect x="200" y="160" width="70" height="35" fill="#f97316" rx="12"/>
  <!-- Phone in hand -->
  <rect x="215" y="140" width="50" height="100" fill="#1e293b" rx="8" stroke="#7c3aed" stroke-width="2"/>
  <rect x="220" y="145" width="40" height="85" fill="#06b6d4" opacity="0.3" rx="6"/>
  <!-- Legs -->
  <rect x="110" y="290" width="30" height="120" fill="#1e3a8a" rx="8"/>
  <rect x="160" y="290" width="30" height="120" fill="#1e3a8a" rx="8"/>
</svg>
