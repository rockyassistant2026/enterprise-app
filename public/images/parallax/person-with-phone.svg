<svg width="300" height="600" viewBox="0 0 300 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ea580c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shirtGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891b2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Head -->
  <circle cx="150" cy="100" r="45" fill="url(#skinGrad)"/>
  
  <!-- Body/Shirt -->
  <ellipse cx="150" cy="220" rx="60" ry="80" fill="url(#shirtGrad)"/>
  
  <!-- Arms -->
  <ellipse cx="85" cy="200" rx="25" ry="70" fill="url(#skinGrad)"/>
  <ellipse cx="215" cy="190" rx="28" ry="75" fill="url(#skinGrad)"/>
  
  <!-- Phone in right hand -->
  <rect x="200" y="140" width="70" height="140" fill="#1e293b" rx="8" stroke="#7c3aed" stroke-width="2"/>
  <rect x="208" y="150" width="54" height="120" fill="#06b6d4" opacity="0.2" rx="4"/>
  <!-- Phone screen lines -->
  <line x1="210" y1="160" x2="260" y2="160" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="175" x2="260" y2="175" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  <line x1="210" y1="190" x2="260" y2="190" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
  
  <!-- Legs -->
  <rect x="125" y="290" width="25" height="100" fill="#1e3a8a" rx="8"/>
  <rect x="150" y="290" width="25" height="100" fill="#1e2850" rx="8"/>
  
  <!-- Shoes -->
  <ellipse cx="137.5" cy="395" rx="18" ry="12" fill="#0f172a"/>
  <ellipse cx="162.5" cy="395" rx="18" ry="12" fill="#0f172a"/>
</svg>
